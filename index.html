<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Cucina Italiana — Menù</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styelrestaurant.css">
</head>
<body>

  <!-- ── HEADER ── -->
  <header>
    <div class="header-inner">

      <a class="logo" href="#">
        <div class="logo-icon">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
            <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
            <line x1="9" y1="9" x2="9.01" y2="9"/>
            <line x1="15" y1="9" x2="15.01" y2="9"/>
          </svg>
        </div>
        <h1>La Cucina Italiana</h1>
      </a>

      <div class="search-wrap">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search-input" placeholder="Cerca piatti, ingredienti…">
      </div>

      <nav class="filters" id="filter-nav">
        <button class="filter-btn active" data-category="Tutto">Tutto</button>
        <button class="filter-btn" data-category="Antipasto">Antipasto</button>
        <button class="filter-btn" data-category="Primo">Primo</button>
        <button class="filter-btn" data-category="Secondo">Secondo</button>
        <button class="filter-btn" data-category="Dolce">Dolce</button>
        <button class="filter-btn" data-category="Pesce">🐟 Pesce</button>
        <button class="filter-btn" data-category="Vegetariano">🌿 Vegetariano</button>
        <button class="filter-btn" data-category="Specialità">⭐ Specialità</button>
      </nav>

    </div>
  </header>

  <!-- ── HERO ── -->
  <section class="hero">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <span class="hero-tag">✦ Bologna, dal 1985</span>
      <h2>Il nostro<br><em>menù</em></h2>
      <p class="hero-sub">Sapori autentici della tradizione italiana, ogni giorno.</p>
    </div>
  </section>

  <!-- ── MAIN ── -->
  <main>
    <div class="section-header">
      <h3 class="section-title">Tutti i piatti</h3>
      <span class="section-count" id="results-count"></span>
    </div>
    <div id="menu"></div>
  </main>

  <!-- ── FOOTER ── -->
  <footer>
    <p>&copy; 2024 <span>La Cucina Italiana</span> — Tutti i diritti riservati.</p>
  </footer>

  <!-- ── MODAL ── -->
  <div class="modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true">
    <div class="modal" id="modal">
      <div class="modal-drag"></div>
      <button class="modal-close" id="modal-close" aria-label="Chiudi">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <img class="modal-img" id="modal-img" src="" alt="">
      <div class="modal-body">
        <div class="modal-badges" id="modal-badges"></div>
        <h2 class="modal-nome" id="modal-nome"></h2>
        <p class="modal-desc" id="modal-desc"></p>
        <div class="detail-block">
          <div class="detail-block-title">Ingredienti principali</div>
          <div class="ingredients-list" id="modal-ingredients"></div>
        </div>
        <div class="modal-divider"></div>
        <div class="modal-info-row">
          <div>
            <div class="modal-prezzo-label">Prezzo</div>
            <div class="modal-prezzo" id="modal-prezzo"></div>
          </div>
          <div class="detail-block" style="margin:0; padding:12px 18px; text-align:right;">
            <div class="detail-block-title">Disponibilità</div>
            <p style="font-weight:500; color:#2d7a3a;">✓ Disponibile oggi</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="scriptrestaurant.js"></script>
</body>
</html>
